# Remote control (required for sidebar kitten)
allow_remote_control yes
listen_on unix:/tmp/kitty.sock

# Layout: 新窗口左右并排（竖分割线），保留 stack 可切换全屏
enabled_layouts horizontal,splits,stack

# Tab 位置和样式
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Tab 最小宽度，让每个 tab 不要太窄
tab_bar_min_tabs 1
tab_bar_align left

# Tab 内容格式：显示编号 + 名字 + 是否有活动
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {(title[2:] if title.startswith('p:') else tab.active_wd.rsplit('/', 1)[-1])}"

# 颜色（Catppuccin 风格）
active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
active_tab_font_style   bold

inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
inactive_tab_font_style normal

tab_bar_background      #181825
tab_bar_margin_color    #181825

# Tab bar 上下留一点空间，让它更显眼
tab_bar_margin_height 4.0 4.0

# Sidebar kitten
map ctrl+shift+s launch --type=background kitty +runpy "exec(open(__import__('os').path.expanduser('~/.config/kitty/sidebar_ctl.py')).read(), globals()); toggle()"
map cmd+t launch --type=background kitty +runpy "exec(open(__import__('os').path.expanduser('~/.config/kitty/sidebar_ctl.py')).read(), globals()); new_tab_with_sidebar()"
# Linux 上 cmd 键不可用，用 ctrl+shift+t 替代
map ctrl+shift+t launch --type=background kitty +runpy "exec(open(__import__('os').path.expanduser('~/.config/kitty/sidebar_ctl.py')).read(), globals()); new_tab_with_sidebar()"
